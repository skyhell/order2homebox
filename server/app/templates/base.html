<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ t('app_name') }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script>
    // Set theme before first paint to avoid a flash of the wrong theme.
    (function () {
      var stored = localStorage.getItem('o2h-theme');
      var dark = stored ? stored === 'dark'
                        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    })();
  </script>
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body>
{% block nav %}
<nav class="navbar">
  <div class="nav-inner">
    <a class="brand" href="/">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v10"/></svg>
      {{ t('app_name') }}
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link{% if request.url.path == '/' %} active{% endif %}">{{ t('nav_new') }}</a>
      <a href="/label" class="nav-link{% if request.url.path == '/label' %} active{% endif %}">{{ t('nav_label') }}</a>
      <a href="/settings" class="nav-link{% if request.url.path == '/settings' %} active{% endif %}">{{ t('nav_settings') }}</a>
    </div>
    <div class="nav-actions">
      <span class="lang-switch">
        <a class="lang{% if lang == 'de' %} active{% endif %}" href="/lang/de">DE</a><a class="lang{% if lang == 'en' %} active{% endif %}" href="/lang/en">EN</a>
      </span>
      <button id="theme-toggle" class="icon-btn" type="button" title="{{ t('theme_toggle') }}" aria-label="{{ t('theme_toggle') }}">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
      <a href="/logout" class="nav-link">{{ t('nav_logout') }}</a>
    </div>
  </div>
</nav>
{% endblock %}
<main class="container">
{% block content %}{% endblock %}
</main>
</body>
</html>
